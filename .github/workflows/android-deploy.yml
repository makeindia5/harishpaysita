name: Android Internal Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Deploy Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 195.35.7.25
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/paysita || exit
            git pull
            cd my-backend
            npm install
            pm2 restart index || pm2 restart all

      - name: Wait for Backend
        run: sleep 20

      - name: Verify API Health
        env:
          API_URL: https://indiaapay.com
        run: node scripts/check-api.js

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build App
        run: npx eas build --platform android --profile production --non-interactive
        env:
          EXPO_PUBLIC_API_URL: https://indiaapay.com

      - name: Submit to Play Internal
        run: npx eas submit --platform android --track internal --non-interactive
